name: Build and Release

on:
  push:
  workflow_dispatch:
    inputs:
      release_label:
        description: Optional label for artifact names
        required: false
        type: string
      release_tag:
        description: Optional Git tag to publish as a GitHub release and Homebrew formula asset
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  BINARY_NAME: usfcoursehelper
  README_PATH: README.md

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      release_label: ${{ steps.meta.outputs.release_label }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      publish_release: ${{ steps.meta.outputs.publish_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          raw_label="${{ github.event.inputs.release_label || '' }}"
          raw_tag="${{ github.event.inputs.release_tag || '' }}"

          if [[ -z "$raw_label" ]]; then
            if [[ -n "$raw_tag" ]]; then
              raw_label="$raw_tag"
            else
              raw_label="${GITHUB_SHA::7}"
            fi
          fi

          safe_label="$(printf '%s' "$raw_label" | tr ' /' '--')"
          publish_release=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "$raw_tag" ]]; then
            publish_release=true
          fi

          {
            printf 'release_label=%s\n' "$safe_label"
            printf 'release_tag=%s\n' "$raw_tag"
            printf 'publish_release=%s\n' "$publish_release"
          } >> "$GITHUB_OUTPUT"

  build-linux:
    name: Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            platform_id: linux-x86_64
          - target: aarch64-unknown-linux-musl
            platform_id: linux-aarch64
          - target: armv7-unknown-linux-musleabihf
            platform_id: linux-armv7

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-zigbuild --locked

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          nix shell nixpkgs#zig nixpkgs#zip nixpkgs#xz -c \
            cargo zigbuild --locked --release --target ${{ matrix.target }}

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          package_stem="${BINARY_NAME}-${{ needs.prepare.outputs.release_label }}-${{ matrix.platform_id }}"
          nix shell nixpkgs#zip nixpkgs#xz -c \
            bash ./.github/scripts/package-release.sh \
              "target/${{ matrix.target }}/release/${BINARY_NAME}" \
              "${BINARY_NAME}" \
              "$package_stem" \
              dist \
              "${README_PATH}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ needs.prepare.outputs.release_label }}-${{ matrix.platform_id }}
          path: dist/*

  build-windows:
    name: Windows ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            platform_id: windows-x86_64
          - target: aarch64-pc-windows-msvc
            platform_id: windows-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Windows build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang lld zip xz-utils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-xwin
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-xwin --locked

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          cargo xwin build --locked --release --target ${{ matrix.target }}

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          package_stem="${BINARY_NAME}-${{ needs.prepare.outputs.release_label }}-${{ matrix.platform_id }}"
          bash ./.github/scripts/package-release.sh \
            "target/${{ matrix.target }}/release/${BINARY_NAME}.exe" \
            "${BINARY_NAME}.exe" \
            "$package_stem" \
            dist \
            "${README_PATH}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ needs.prepare.outputs.release_label }}-${{ matrix.platform_id }}
          path: dist/*

  build-macos:
    name: macOS ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            platform_id: macos-x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            platform_id: macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          package_stem="${BINARY_NAME}-${{ needs.prepare.outputs.release_label }}-${{ matrix.platform_id }}"
          nix shell nixpkgs#zip nixpkgs#xz -c \
            bash ./.github/scripts/package-release.sh \
              "target/${{ matrix.target }}/release/${BINARY_NAME}" \
              "${BINARY_NAME}" \
              "$package_stem" \
              dist \
              "${README_PATH}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ needs.prepare.outputs.release_label }}-${{ matrix.platform_id }}
          path: dist/*

  build-macos-universal:
    name: macOS universal
    runs-on: macos-14
    needs:
      - prepare
      - build-macos

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ needs.prepare.outputs.release_label }}-macos-x86_64
          path: artifacts/macos-x86_64

      - name: Download macOS aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ needs.prepare.outputs.release_label }}-macos-aarch64
          path: artifacts/macos-aarch64

      - name: Build universal binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/universal dist
          x86_binary="artifacts/macos-x86_64/${BINARY_NAME}-${{ needs.prepare.outputs.release_label }}-macos-x86_64"
          arm_binary="artifacts/macos-aarch64/${BINARY_NAME}-${{ needs.prepare.outputs.release_label }}-macos-aarch64"
          universal_binary="build/universal/${BINARY_NAME}"
          lipo -create \
            "$x86_binary" \
            "$arm_binary" \
            -output "$universal_binary"
          package_stem="${BINARY_NAME}-${{ needs.prepare.outputs.release_label }}-macos-universal"
          nix shell nixpkgs#zip nixpkgs#xz -c \
            bash ./.github/scripts/package-release.sh \
              "$universal_binary" \
              "${BINARY_NAME}" \
              "$package_stem" \
              dist \
              "${README_PATH}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ needs.prepare.outputs.release_label }}-macos-universal
          path: dist/*

  checksums:
    name: Checksums
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-linux
      - build-windows
      - build-macos
      - build-macos-universal

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum ./* > SHA256SUMS.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/SHA256SUMS.txt

  publish-release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - prepare
      - checksums
    if: ${{ needs.prepare.outputs.publish_release == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          asset_name="${BINARY_NAME}-${{ needs.prepare.outputs.release_label }}-macos-universal.tar.gz"
          sha256="$(grep "  ./${asset_name}$" dist/SHA256SUMS.txt | cut -d' ' -f1)"
          bash ./.github/scripts/render-homebrew-formula.sh \
            "${{ github.repository }}" \
            "${{ needs.prepare.outputs.release_tag }}" \
            "$asset_name" \
            "$sha256" \
            "dist/${BINARY_NAME}.rb"

      - name: Upload formula artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula
          path: dist/${{ env.BINARY_NAME }}.rb

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          files: |
            dist/*
