name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      release_label:
        description: Optional label for artifact names
        required: false
        type: string
      release_tag:
        description: Optional Git tag to publish as a GitHub release and Homebrew formula asset
        required: false
        type: string

permissions:
  contents: write

env:
  BINARY_NAME: usfcoursehelper
  README_PATH: README.md

jobs:
  build-linux:
    name: Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            platform_id: linux-x86_64
          - target: aarch64-unknown-linux-musl
            platform_id: linux-aarch64
          - target: armv7-unknown-linux-musleabihf
            platform_id: linux-armv7

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y zig zip xz-utils

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Resolve release label
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.release_label }}" ]]; then
            label="${{ github.event.inputs.release_label }}"
          else
            label="$(git describe --tags --always)"
          fi
          safe_label="$(printf '%s' "$label" | tr ' /' '--')"
          printf 'label=%s\n' "$safe_label" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: cargo zigbuild --locked --release --target ${{ matrix.target }}

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          package_stem="${BINARY_NAME}-${{ steps.meta.outputs.label }}-${{ matrix.platform_id }}"
          bash ./.github/scripts/package-release.sh \
            "target/${{ matrix.target }}/release/${BINARY_NAME}" \
            "${BINARY_NAME}" \
            "$package_stem" \
            dist \
            "${README_PATH}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ steps.meta.outputs.label }}-${{ matrix.platform_id }}
          path: dist/*

  build-windows:
    name: Windows ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            platform_id: windows-x86_64
          - target: aarch64-pc-windows-msvc
            platform_id: windows-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y zip xz-utils clang lld

      - name: Install cargo-xwin
        run: cargo install cargo-xwin --locked

      - name: Resolve release label
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.release_label }}" ]]; then
            label="${{ github.event.inputs.release_label }}"
          else
            label="$(git describe --tags --always)"
          fi
          safe_label="$(printf '%s' "$label" | tr ' /' '--')"
          printf 'label=%s\n' "$safe_label" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: cargo xwin build --locked --release --target ${{ matrix.target }}

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          package_stem="${BINARY_NAME}-${{ steps.meta.outputs.label }}-${{ matrix.platform_id }}"
          bash ./.github/scripts/package-release.sh \
            "target/${{ matrix.target }}/release/${BINARY_NAME}.exe" \
            "${BINARY_NAME}.exe" \
            "$package_stem" \
            dist \
            "${README_PATH}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ steps.meta.outputs.label }}-${{ matrix.platform_id }}
          path: dist/*

  build-macos:
    name: macOS ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            platform_id: macos-x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            platform_id: macos-aarch64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Resolve release label
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.release_label }}" ]]; then
            label="${{ github.event.inputs.release_label }}"
          else
            label="$(git describe --tags --always)"
          fi
          safe_label="$(printf '%s' "$label" | tr ' /' '--')"
          printf 'label=%s\n' "$safe_label" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          package_stem="${BINARY_NAME}-${{ steps.meta.outputs.label }}-${{ matrix.platform_id }}"
          bash ./.github/scripts/package-release.sh \
            "target/${{ matrix.target }}/release/${BINARY_NAME}" \
            "${BINARY_NAME}" \
            "$package_stem" \
            dist \
            "${README_PATH}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ steps.meta.outputs.label }}-${{ matrix.platform_id }}
          path: dist/*

  build-macos-universal:
    name: macOS universal
    runs-on: macos-14
    needs: build-macos

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release label
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.release_label }}" ]]; then
            label="${{ github.event.inputs.release_label }}"
          else
            label="$(git describe --tags --always)"
          fi
          safe_label="$(printf '%s' "$label" | tr ' /' '--')"
          printf 'label=%s\n' "$safe_label" >> "$GITHUB_OUTPUT"

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ steps.meta.outputs.label }}-macos-x86_64
          path: artifacts/macos-x86_64

      - name: Download macOS aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ steps.meta.outputs.label }}-macos-aarch64
          path: artifacts/macos-aarch64

      - name: Build universal binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/universal dist
          x86_binary="artifacts/macos-x86_64/${BINARY_NAME}-${{ steps.meta.outputs.label }}-macos-x86_64"
          arm_binary="artifacts/macos-aarch64/${BINARY_NAME}-${{ steps.meta.outputs.label }}-macos-aarch64"
          universal_binary="build/universal/${BINARY_NAME}"
          mkdir -p dist
          lipo -create \
            "$x86_binary" \
            "$arm_binary" \
            -output "$universal_binary"
          package_stem="${BINARY_NAME}-${{ steps.meta.outputs.label }}-macos-universal"
          bash ./.github/scripts/package-release.sh \
            "$universal_binary" \
            "${BINARY_NAME}" \
            "$package_stem" \
            dist \
            "${README_PATH}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ steps.meta.outputs.label }}-macos-universal
          path: dist/*

  checksums:
    name: Checksums
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-macos-universal

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum ./* > SHA256SUMS.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/SHA256SUMS.txt

  publish-release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - checksums
    if: ${{ github.event.inputs.release_tag != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release label
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.release_label }}" ]]; then
            label="${{ github.event.inputs.release_label }}"
          else
            label="$(git describe --tags --always)"
          fi
          safe_label="$(printf '%s' "$label" | tr ' /' '--')"
          printf 'label=%s\n' "$safe_label" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          asset_name="${BINARY_NAME}-${{ steps.meta.outputs.label }}-macos-universal.tar.gz"
          sha256="$(grep "  ./${asset_name}$" dist/SHA256SUMS.txt | cut -d' ' -f1)"
          bash ./.github/scripts/render-homebrew-formula.sh \
            "${{ github.repository }}" \
            "${{ github.event.inputs.release_tag }}" \
            "$asset_name" \
            "$sha256" \
            "dist/${BINARY_NAME}.rb"

      - name: Upload formula artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula
          path: dist/${{ env.BINARY_NAME }}.rb

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          generate_release_notes: true
          files: |
            dist/*
